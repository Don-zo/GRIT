<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIT - 홈</title>
    <meta name="description" content="GRIT 대시보드 - 그룹 화상회의 플랫폼">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-logo">G</div>
            <div class="sidebar-nav">
                <a href="/main.html" class="sidebar-link active" id="nav-home">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    <span class="tooltip">홈</span>
                </a>
                <a href="/groups.html" class="sidebar-link" id="nav-groups">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span class="tooltip">그룹</span>
                </a>
                <a href="/friends.html" class="sidebar-link" id="nav-friends">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                    </svg>
                    <span class="tooltip">친구</span>
                </a>
                <a href="/todo.html" class="sidebar-link" id="nav-todo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                    <span class="tooltip">투두</span>
                </a>
                <a href="/group-todos.html" class="sidebar-link" id="nav-group-todo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 6h13" />
                        <path d="M8 12h13" />
                        <path d="M8 18h13" />
                        <path d="M3 6h.01" />
                        <path d="M3 12h.01" />
                        <path d="M3 18h.01" />
                    </svg>
                    <span class="tooltip">그룹 투두</span>
                </a>
                <div class="sidebar-separator"></div>
                <a class="sidebar-link sidebar-logout" id="logout-link">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span class="tooltip">로그아웃</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1>홈</h1>
                    <p id="welcome-message">로딩 중...</p>
                </div>
                <div class="page-header-right">
                    <button id="delete-account-btn" class="btn btn-danger">탈퇴</button>
                </div>
            </div>

            <!-- Profile Card -->
            <div class="profile-card" id="profile-section">
                <div class="profile-card-header">
                    <div class="profile-card-avatar-placeholder skeleton" id="profile-avatar" style="width:56px;height:56px;border-radius:9999px;"></div>
                    <div class="profile-card-header-info">
                        <div class="profile-name skeleton" id="profile-nickname"
                            style="height:24px;width:140px;border-radius:6px;">&nbsp;</div>
                        <div class="profile-email skeleton" id="profile-email"
                            style="height:14px;width:180px;border-radius:4px;">&nbsp;</div>
                    </div>
                </div>
                <div class="profile-intro" id="profile-introduction"></div>

                <div class="profile-meta" id="profile-meta" style="display:none;">
                    <div class="profile-meta-item" id="dday-section" style="display:none;">
                        <span class="profile-meta-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </span>
                        <span class="profile-meta-label">D-Day</span>
                        <span class="profile-meta-value" id="profile-dday"></span>
                    </div>
                    <div class="profile-meta-item" id="weekly-goal-section" style="display:none;">
                        <span class="profile-meta-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <circle cx="12" cy="12" r="6"></circle>
                                <circle cx="12" cy="12" r="2"></circle>
                            </svg>
                        </span>
                        <span class="profile-meta-label">주간 목표</span>
                        <span class="profile-meta-value" id="profile-weekly-goal"></span>
                    </div>
                </div>

                <button id="edit-profile-btn" class="profile-edit-btn" style="display:none;">
                    프로필 수정
                </button>
            </div>

            <!-- Menu Section -->
            <div class="section-title">메뉴</div>
            <div class="card-list">
                <div class="nav-card" onclick="window.location.href='/groups.html'">
                    <div class="nav-card-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                    </div>
                    <div class="nav-card-info">
                        <h3>내 그룹</h3>
                        <p>그룹 생성, 참가 및 화상회의</p>
                    </div>
                    <span class="nav-card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 18 6-6-6-6" />
                        </svg></span>
                </div>
                <div class="nav-card" onclick="window.location.href='/friends.html'">
                    <div class="nav-card-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                        </svg>
                    </div>
                    <div class="nav-card-info">
                        <h3>친구</h3>
                        <p>친구 추가 및 관리</p>
                    </div>
                    <span class="nav-card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 18 6-6-6-6" />
                        </svg></span>
                </div>
            </div>

            <div id="error-message" class="error-message"></div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="icons.js"></script>
    <script src="utils.js"></script>
    <script src="main.js"></script>
</body>

</html>
