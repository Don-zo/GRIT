<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIT - 프로필 설정</title>
    <meta name="description" content="GRIT 프로필 설정 - 닉네임과 자기소개를 입력하세요.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">GRIT</div>

            <h1 class="auth-title">환영합니다!</h1>
            <p class="auth-subtitle">프로필을 설정해주세요</p>

            <form id="profile-form">
                <div class="form-group">
                    <label>이메일</label>
                    <div id="user-email" class="email-display">로딩 중...</div>
                </div>

                <div class="form-group">
                    <label for="nickname">닉네임 *</label>
                    <input type="text" id="nickname" name="nickname" class="form-input" placeholder="사용할 닉네임을 입력하세요"
                        required maxlength="20" />
                    <div class="char-counter"><span id="nickname-counter">0</span> / 20</div>
                </div>

                <div class="form-group">
                    <label for="introduction">자기소개</label>
                    <textarea id="introduction" name="introduction" class="form-input"
                        placeholder="간단한 자기소개를 입력하세요 (선택사항)" maxlength="200"></textarea>
                    <div class="char-counter"><span id="intro-counter">0</span> / 200</div>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary btn-full">
                    완료
                </button>
            </form>

            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="profile-setup.js"></script>
</body>

</html>
