<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIT - 프로필 설정</title>
    <meta name="description" content="GRIT 프로필 설정 - 닉네임과 자기소개를 입력하세요.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">GRIT</div>

            <h1 class="auth-title">환영합니다!</h1>
            <p class="auth-subtitle">프로필을 설정해주세요</p>

            <form id="profile-form">
                <div class="profile-image-upload" id="image-upload-area">
                    <div class="profile-image-preview" id="image-preview" title="프로필 사진 변경">
                        <div class="profile-image-placeholder" id="image-placeholder">?</div>
                        <img id="image-preview-img" src="" alt="프로필 이미지" style="display:none;" />
                        <div class="profile-image-overlay" id="image-overlay">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                                <circle cx="12" cy="13" r="4"/>
                            </svg>
                        </div>
                    </div>
                    <span class="upload-hint">클릭하여 프로필 사진 업로드</span>
                    <button type="button" class="profile-image-remove-btn" id="image-remove-btn" style="display:none;">사진 삭제</button>
                    <input type="file" id="image-input" accept="image/jpeg,image/png,image/webp" style="display:none;" />
                </div>

                <div class="form-group">
                    <label>이메일</label>
                    <div id="user-email" class="email-display">로딩 중...</div>
                </div>

                <div class="form-group">
                    <label for="nickname">닉네임 *</label>
                    <input type="text" id="nickname" name="nickname" class="form-input" placeholder="사용할 닉네임을 입력하세요"
                        required maxlength="20" />
                    <div class="char-counter"><span id="nickname-counter">0</span> / 20</div>
                </div>

                <div class="form-group">
                    <label for="introduction">자기소개</label>
                    <textarea id="introduction" name="introduction" class="form-input"
                        placeholder="간단한 자기소개를 입력하세요 (선택사항)" maxlength="200"></textarea>
                    <div class="char-counter"><span id="intro-counter">0</span> / 200</div>
                </div>

                <div class="form-divider"></div>

                <div class="form-group">
                    <label>D-Day (선택)</label>
                    <div class="form-row">
                        <input type="date" id="d-day-date" name="dDayDate" class="form-input" />
                        <input type="text" id="d-day-title" name="dDayTitle" class="form-input"
                            placeholder="D-Day 제목 (예: 정보처리기사)" maxlength="30" />
                    </div>
                    <div class="form-hint">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        <span>날짜와 제목을 함께 입력하거나, 둘 다 비워두세요.</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>주간 공부 목표 (선택)</label>
                    <div class="duration-input-group">
                        <div class="duration-field">
                            <select id="goal-hours" class="form-select">
                                <option value="">시간 선택</option>
                                <option value="0">0시간</option>
                                <option value="1">1시간</option>
                                <option value="2">2시간</option>
                                <option value="3">3시간</option>
                                <option value="4">4시간</option>
                                <option value="5">5시간</option>
                                <option value="6">6시간</option>
                                <option value="7">7시간</option>
                                <option value="8">8시간</option>
                                <option value="9">9시간</option>
                                <option value="10">10시간</option>
                                <option value="11">11시간</option>
                                <option value="12">12시간</option>
                                <option value="13">13시간</option>
                                <option value="14">14시간</option>
                                <option value="15">15시간</option>
                                <option value="16">16시간</option>
                                <option value="17">17시간</option>
                                <option value="18">18시간</option>
                                <option value="19">19시간</option>
                                <option value="20">20시간</option>
                                <option value="21">21시간</option>
                                <option value="22">22시간</option>
                                <option value="23">23시간</option>
                            </select>
                        </div>
                        <div class="duration-separator">:</div>
                        <div class="duration-field">
                            <select id="goal-minutes" class="form-select">
                                <option value="">분 선택</option>
                                <option value="0">00분</option>
                                <option value="10">10분</option>
                                <option value="20">20분</option>
                                <option value="30">30분</option>
                                <option value="40">40분</option>
                                <option value="50">50분</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-hint">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        <span>1주일 동안 달성할 총 공부 시간 (최대 23시간 50분)</span>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary btn-full">
                    완료
                </button>
            </form>

            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="profile-setup.js"></script>
</body>

</html>
