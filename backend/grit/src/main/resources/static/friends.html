<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIT - 친구</title>
    <meta name="description" content="GRIT 친구 관리 - 친구 추가 및 목록 관리">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-logo">G</div>
            <div class="sidebar-nav">
                <a href="/main.html" class="sidebar-link" id="nav-home">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">

                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    <span class="tooltip">홈</span>
                </a>
                <a href="/groups.html" class="sidebar-link" id="nav-groups">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span class="tooltip">그룹</span>
                </a>
                <a href="/friends.html" class="sidebar-link active" id="nav-friends">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                    </svg>
                    <span class="tooltip">친구</span>
                </a>
                <a href="/todo.html" class="sidebar-link" id="nav-todo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                    <span class="tooltip">투두</span>
                </a>
                <a href="/group-todos.html" class="sidebar-link" id="nav-group-todo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 6h13" />
                        <path d="M8 12h13" />
                        <path d="M8 18h13" />

                        <path d="M3 12h.01" />
                        <path d="M3 18h.01" />
                    </svg>
                    <span class="tooltip">그룹 투두</span>
                </a>
                <div class="sidebar-separator"></div>
                <a class="sidebar-link sidebar-logout" id="logout-link">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span class="tooltip">로그아웃</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1>친구</h1>
                    <p>친구 목록 관리</p>
                </div>
            </div>

            <div class="action-row">
                <button class="btn btn-primary btn-full" id="add-friend-btn">+ 친구 추가</button>
            </div>

            <div id="friend-list" class="card-list">
                <div class="skeleton-card">
                    <div class="skeleton skeleton-avatar" style="border-radius:50%;width:46px;height:46px;"></div>
                    <div class="skeleton-content">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-meta"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton skeleton-avatar" style="border-radius:50%;width:46px;height:46px;"></div>
                    <div class="skeleton-content">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-meta"></div>
                    </div>
                </div>
            </div>

            <div id="error-message" class="error-message"></div>
        </main>
    </div>

    <!-- 친구 추가 모달 -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <h2>친구 추가</h2>
            <p class="modal-subtitle">상대방의 닉네임을 입력하세요</p>
            <div class="form-group">
                <label for="friend-nickname">닉네임</label>
                <input type="text" id="friend-nickname" class="form-input" placeholder="닉네임 입력" />
            </div>
            <div id="add-error" class="error-message"></div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="add-cancel-btn">취소</button>
                <button class="btn btn-primary" id="add-submit-btn">추가</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="icons.js"></script>
    <script src="utils.js"></script>
    <script src="friends.js"></script>
</body>

</html>
