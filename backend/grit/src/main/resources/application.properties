spring.application.name=grit

spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace

livekit.url=${LIVEKIT_URL}
livekit.api.key=${LIVEKIT_API_KEY}
livekit.api.secret=${LIVEKIT_API_SECRET}

spring.cloud.aws.region.static=ap-northeast-2
spring.cloud.aws.credentials.access-key=${AWS_S3_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_S3_SECRET_KEY}
app.s3.bucket-name=${AWS_S3_BUCKET_NAME}
app.s3.base-url=https://${AWS_S3_BUCKET_NAME}.s3.ap-northeast-2.amazonaws.com

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=id

google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/callback.html}

jwt.secret=${JWT_SECRET:a-very-long-and-secure-random-string-for-dev-only}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}

management.endpoints.web.exposure.include=prometheus,health,info
management.metrics.tags.application=grit
