name: Backend Production CI/CD

on:
  push:
    branches: [ "main", "dev/backend" ]

jobs:
  # [CI] GitHub Runner에서 빌드 + 아티팩트 생성
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/grit

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: backend/grit/build/libs/*.jar
          retention-days: 1

  # [CD] 실제 서버 배포 (Self-hosted) - 임시
  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: ./temp_artifact

      - name: Deploy
        run: |
          # 1. 경로 및 변수 설정
          TARGET=$HOME/GRIT/backend
          JAR_NAME=grit-app.jar
          mkdir -p $TARGET

          # 2. 기존 프로세스 종료
          PID=$(pgrep -f $JAR_NAME) || true
          if [ -n "$PID" ]; then
            kill -15 $PID
            sleep 10
            kill -9 $PID 2>/dev/null || true
          fi

          # 3. 새 Jar 파일 이동
          if [ -d "./temp_artifact" ]; then
            find ./temp_artifact -name "*.jar" -exec mv {} $TARGET/$JAR_NAME \;
            rm -rf ./temp_artifact
          else
            echo "Error: Artifact not found"
            exit 1
          fi

          # 4. 백그라운드 실행
          cd $TARGET
          chmod +x $JAR_NAME
          nohup java -jar $JAR_NAME > app.log 2>&1 &
